version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: credit-risk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  redis-insight:
    image: redis/redisinsight:latest
    container_name: credit-risk-redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    depends_on:
      - redis

  feature-service:
    build:
      context: ../feature_service
    container_name: credit-risk-feature-service
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

volumes:
  redis_data:
  redis_insight_data: