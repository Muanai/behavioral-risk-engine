version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: feature_store
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"